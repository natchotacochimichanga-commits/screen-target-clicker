name: Bug Report
description: Something is broken or not working as expected.
title: "[Bug]: "
labels:
  - bug
body:
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Describe the bug and what you expected instead.
      placeholder: I clicked START and...
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: "1. Open app\n2. Select window\n3. ..."
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: App version
      placeholder: v1.3
  - type: input
    id: os
    attributes:
      label: Windows version
      placeholder: Windows 11
  - type: textarea
    id: extra
    attributes:
      label: Anything else?
      description: Screenshots, logs, or config details help a lot.
